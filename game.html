<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spin The Wheel Game</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- ===================================================== -->
<!-- ⭐⭐⭐⭐⭐ HEADER SYSTEM (CandyTrack navigation) ⭐⭐⭐⭐⭐ -->
<!-- ===================================================== -->

<header>

<h1>Spin The Wheel Game</h1>

<div class="button-row">

<!-- shuffle word -->
<button id="shuffleBtn">Shuffle</button>

<!-- previous word -->
<button id="prevWordBtn">← Previous</button>

<!-- next word -->
<button id="nextWordBtn">Next →</button>

<!-- back to menu -->
<button id="mainMenuBtn">Back to Main Menu</button>

</div>

</header>

<!-- ===================================================== -->
<!-- ⭐⭐⭐⭐⭐ END HEADER SYSTEM ⭐⭐⭐⭐⭐ -->
<!-- ===================================================== -->



<div id="game-container">



<!-- ===================================================== -->
<!-- ⭐⭐⭐⭐⭐ PHONICS ENGINE — COPY AND PASTE THIS PART ⭐⭐⭐⭐⭐ -->
<!-- ===================================================== -->

<div id="left-panel">

<!-- IMAGE (placeholder system controlled by JS) -->
<img id="image" src="" alt="word image">


<!-- LETTER BUTTONS -->
<div id="letters"></div>


<!-- BLEND BUTTON -->
<button id="blendBtn" disabled>

Blend

</button>

</div>

<!-- ===================================================== -->
<!-- ⭐⭐⭐⭐⭐ END PHONICS ENGINE — COPY AND PASTE THIS PART ⭐⭐⭐⭐⭐ -->
<!-- ===================================================== -->





<!-- ===================================================== -->
<!-- GAME PANEL -->
<!-- ===================================================== -->

<div id="right-panel">


<div class="instructions">

Spin the wheel. If it lands on 🍎 your team wins an apple.
First team with 3 apples wins!

</div>



<!-- ===================================================== -->
<!-- SCOREBOARD -->
<!-- ===================================================== -->

<div class="scoreboard">


<!-- DOG TEAM -->

<div id="dogTeam" class="team dog active">

<span class="team-emoji">🐶</span>

<div class="goal">

<span class="apple muted">🍎</span>
<span class="apple muted">🍎</span>
<span class="apple muted">🍎</span>

</div>

</div>



<!-- TIGER TEAM -->

<div id="tigerTeam" class="team tiger">

<span class="team-emoji">🐯</span>

<div class="goal">

<span class="apple muted">🍎</span>
<span class="apple muted">🍎</span>
<span class="apple muted">🍎</span>

</div>

</div>


</div>



<!-- ===================================================== -->
<!-- WHEEL -->
<!-- ===================================================== -->

<div class="wheel-container">

<div class="pointer">⬇️</div>

<canvas id="wheel" width="420" height="420"></canvas>

</div>



<!-- ===================================================== -->
<!-- SPIN BUTTON -->
<!-- ===================================================== -->

<button id="spinBtn" class="spin-btn muted" disabled>

SPIN

</button>



</div>

</div>



<!-- ===================================================== -->
<!-- ⭐ GAME SCRIPT -->
<!-- ===================================================== -->

<script src="game.js"></script>


</body>

</html>
